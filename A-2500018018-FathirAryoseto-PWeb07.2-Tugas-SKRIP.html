<HTML>

<HEAD>
    <TITLE>Konversi Nilai Angka ke Huruf</TITLE>
</HEAD>

<BODY>

    <SCRIPT LANGUAGE="JavaScript">
        <!--
        var nilai = parseInt(prompt("Masukkan Nilai (0-100): ", 0));
        var hasil;
        
        if (nilai >= 0 && nilai <= 21) {
            hasil = "E";
        }
        else if (nilai >= 39 && nilai <= 40) {
            hasil = "D";
        }
        else if (nilai >= 64 && nilai <= 65) {
            hasil = "C";
        }
        else if (nilai >= 79 && nilai <= 80) {
            hasil = "B";
        }
        else if (nilai ==100) {
            hasil = "A";
        }
        else {
            hasil = "Nilai tidak valid";
        }
        
        document.write("Nilai Angka: " + nilai + "<br>");
        document.write("Nilai Huruf: " + hasil);
        //-->
    </SCRIPT>

</BODY>

</HTML>
